#!/usr/bin/env bash

# Build
YOCTO_BUILD_DIR="build"
YOCTO_MACHINE="raspberrypi3-64"
YOCTO_IMAGE="ota-platform-default-image"

# Release
IMAGE_VERSION="1.0.0"
BUILD_ID="dev"

# Mender
MENDER_SERVER_URL="https://hosted.mender.io"
MENDER_API_TOKEN=""
MENDER_DEVICE_GROUP="raspberrypi"

# Device
DEVICE_NAME="rpi-demo"
SSH_USER="root"
SSH_HOST="192.168.1.100"

# Certificates
MENDER_SERVER_CERT="${PROJECT_ROOT}/certificates/server.crt"

# Derived
YOCTO_DEPLOY_DIR="${YOCTO_BUILD_DIR}/tmp/deploy/images/${YOCTO_MACHINE}"
OTA_ARTIFACT_NAME="${YOCTO_IMAGE}-${IMAGE_VERSION}-${BUILD_ID}"
ARTIFACT_FILE="${YOCTO_DEPLOY_DIR}/${OTA_ARTIFACT_NAME}.mender"
